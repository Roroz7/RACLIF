version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: raclif-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raclif_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-raclif_password}
      POSTGRES_DB: ${POSTGRES_DB:-raclif}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
